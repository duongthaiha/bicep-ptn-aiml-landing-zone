name: Sandbox cleanup

# Deletes everything in the pr-sandbox RG except the RG itself.
# Use after testing to avoid leaving Azure resources running.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type 'delete' to confirm. Anything else aborts.
        type: string
        required: true
      environment:
        type: string
        default: pr-sandbox

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    if: ${{ inputs.confirm == 'delete' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: List then delete resources
        shell: bash
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          echo "## Resources in $RG before delete" >> "$GITHUB_STEP_SUMMARY"
          az resource list -g "$RG" --query "[].{name:name,type:type}" -o table | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo
          # Delete all resources but keep the RG (so federation/RBAC stay intact)
          ids=$(az resource list -g "$RG" --query "[].id" -o tsv)
          if [ -z "$ids" ]; then
            echo "Nothing to delete."
            exit 0
          fi
          # Delete in batches to avoid command length limits
          xargs -d '\n' -n 50 az resource delete --ids <<< "$ids" || true
          echo "## Remaining resources" >> "$GITHUB_STEP_SUMMARY"
          az resource list -g "$RG" -o table | tee -a "$GITHUB_STEP_SUMMARY" || true
