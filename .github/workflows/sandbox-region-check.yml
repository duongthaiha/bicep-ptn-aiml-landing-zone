name: Sandbox region availability check

# Probes regions for the SKUs/quotas this landing zone needs.
# Output goes to the job summary.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated regions to probe'
        type: string
        default: 'eastus,eastus2,westus3,northcentralus,southcentralus,westeurope,northeurope,uksouth,swedencentral,australiaeast,japaneast'
      environment:
        type: string
        default: pr-sandbox

permissions:
  id-token: write
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Probe regions
        shell: bash {0}
        env:
          REGIONS: ${{ inputs.regions }}
          SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          IFS=',' read -ra LIST <<< "$REGIONS"

          # Pull global Search SKUs once; each SKU lists which locations it's offered in
          SEARCH_JSON=$(az rest --method get \
            --url "https://management.azure.com/subscriptions/$SUB/providers/Microsoft.Search/skus?api-version=2025-05-01" 2>/dev/null || echo '{"value":[]}')

          search_skus_in() {
            local region=$1
            echo "$SEARCH_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); r='$region'.lower(); out=[s.get('sku',{}).get('name','?') for s in d.get('value',[]) if r in [l.lower().replace(' ','') for l in s.get('locations',[])]]; print(','.join(out) if out else 'NONE')"
          }

          quota_search() {
            local region=$1
            az rest --method get \
              --url "https://management.azure.com/subscriptions/$SUB/providers/Microsoft.Search/locations/$region/usages?api-version=2024-03-01-preview" \
              --query "value[?currentValue<limit].name.value" -o tsv 2>/dev/null | head -1 || echo "?"
          }

          cog_kinds() {
            local region=$1
            az cognitiveservices account list-skus -l "$region" --query "length(@)" -o tsv 2>/dev/null || echo 0
          }

          cosmos_available() {
            local region=$1
            az cosmosdb locations show --location "$region" --query "name" -o tsv 2>/dev/null
          }

          cae_available() {
            local region=$1
            az provider show -n "Microsoft.App" \
              --query "resourceTypes[?resourceType=='managedEnvironments'].locations | [0]" -o tsv 2>/dev/null \
              | tr -d ' ' | tr '[:upper:]' '[:lower:]' \
              | grep -q "^$(echo $region | tr -d ' ' | tr '[:upper:]' '[:lower:]')$" && echo yes || echo no
          }

          {
            echo "## Region availability probe (subscription: $SUB)"
            echo ""
            echo "| Region | AI Search SKUs | CogSvc/Foundry SKUs | Cosmos DB | Container Apps Env |"
            echo "|---|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for r in "${LIST[@]}"; do
            r=$(echo "$r" | xargs)
            srch=$(search_skus_in "$r")
            [ "$srch" = "NONE" ] && srch_md="❌" || srch_md="✅ $srch"
            cog=$(cog_kinds "$r")
            [ "$cog" = "0" ] && cog_md="❌" || cog_md="✅ $cog"
            cos=$(cosmos_available "$r")
            [ -z "$cos" ] && cos_md="❌" || cos_md="✅"
            cae=$(cae_available "$r")
            [ "$cae" = "yes" ] && cae_md="✅" || cae_md="❌"
            echo "| $r | $srch_md | $cog_md | $cos_md | $cae_md |" >> "$GITHUB_STEP_SUMMARY"
            echo "$r → search=[$srch] cog=$cog cosmos=$cos cae=$cae"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_SKU/quota metadata only — actual capacity (\`InsufficientResourcesAvailable\`) varies in real time._" >> "$GITHUB_STEP_SUMMARY"
