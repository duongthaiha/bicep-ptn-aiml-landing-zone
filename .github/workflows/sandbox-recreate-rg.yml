name: Sandbox recreate RG (fast cleanup)

# Deletes and recreates the sandbox RG, then reapplies the SP RBAC bindings.
# Faster than per-resource cleanup because RG delete parallelises everything.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type 'recreate' to confirm.
        type: string
        required: true
      environment:
        type: string
        default: pr-sandbox

permissions:
  id-token: write
  contents: read

jobs:
  recreate:
    if: ${{ inputs.confirm == 'recreate' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Recreate RG and reapply RBAC
        shell: bash
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          LOC: ${{ vars.AZURE_LOCATION }}
          SP: ${{ vars.AZURE_CLIENT_ID }}
          SUB: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          # Resolve SP object ID from app/client ID
          SP_OID=$(az ad sp show --id "$SP" --query id -o tsv)
          echo "SP object ID: $SP_OID"

          if az group show -n "$RG" >/dev/null 2>&1; then
            echo "Deleting RG $RG (this is async + parallel)..."
            az group delete -n "$RG" --yes --no-wait
            echo "Waiting for RG deletion..."
            for i in $(seq 1 60); do
              if ! az group show -n "$RG" >/dev/null 2>&1; then
                echo "RG deleted."
                break
              fi
              sleep 30
              echo "  ...still deleting (${i}/60)"
            done
          fi

          echo "Creating RG $RG in $LOC..."
          az group create -n "$RG" -l "$LOC" >/dev/null

          echo "Assigning Contributor + UAA on RG to SP..."
          SCOPE="/subscriptions/$SUB/resourceGroups/$RG"
          az role assignment create --assignee-object-id "$SP_OID" --assignee-principal-type ServicePrincipal \
            --role Contributor --scope "$SCOPE" >/dev/null || true
          az role assignment create --assignee-object-id "$SP_OID" --assignee-principal-type ServicePrincipal \
            --role "User Access Administrator" --scope "$SCOPE" >/dev/null || true
          echo "Done."
